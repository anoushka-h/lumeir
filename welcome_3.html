<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumeir — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ---------- Lumeir tokens (only the ones this screen uses) ---------- */
  :root {
    /* colors */
    --color-primary:         #03A582;   /* CTA gradient start */
    --color-primary-deep:    #058569;   /* headline / wordmark / body text on mint surface */
    --color-accent-bright:   #46FFCA;   /* logo gradient top stop */
    --color-teal-deep:       #0E7F95;   /* logo inner-flame top */
    --color-cyan-bright:     #38EFF5;   /* logo inner-flame bottom */
    --color-teal-mid:        #29A0B8;   /* CTA gradient end */
    --color-sidebar:         #E9FAF6;   /* page background on this screen — new use */
    --color-sidebar-border:  #D6F1EA;   /* footer hairline */
    --color-text:            #FFFFFF;   /* CTA label */

    /* illustration-only — NOT part of the locked palette, flagged in proposal */
    --illus-yellow:          #FFD838;
    --illus-beige:           #D6CF9D;

    /* shadow */
    --shadow-cta: 0px 4px 7px rgba(63, 255, 200, 0.20);

    /* radius */
    --r-md: 8px;

    /* type */
    --font-display: 'Manrope', 'Inter', system-ui, sans-serif;  /* NEW — Manrope, flagged in proposal */
    --font-body:    'Inter', system-ui, sans-serif;
  }

  /* ---------- reset / base ---------- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    color: var(--color-primary-deep);
    background: #ffffff;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ---------- the Welcome canvas ----------
     The Figma spec is a fixed 1280×832 frame. To fill the viewport:
     - Outer .welcome stretches edge-to-edge horizontally and to the viewport height.
     - Inner .canvas is a 1280px container centered horizontally; the absolute-
       positioned children (logo, content, illustration) sit inside it at their
       exact spec coordinates.
     - The mint background extends to the full viewport (no letterboxing).
     - Below 1280px, the page scrolls horizontally (no responsive rules in spec).
     [EXTRAPOLATED — Figma did not specify behavior above or below 1280px.]
  */
  .welcome {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background: var(--color-sidebar);
    overflow-x: auto;
  }
  .canvas {
    position: relative;
    width: 1280px;
    min-height: 832px;
    margin: 0 auto;
  }

  /* footer hairline at y=771, width 189px, left 0 (inside canvas) */
  .canvas::after {
    content: "";
    position: absolute;
    left: 0;
    top: 771px;
    width: 189px;
    height: 0;
    border-top: 1px solid var(--color-sidebar-border);
  }

  /* ---------- logo (top-left, 64 / 53) ---------- */
  .logo {
    position: absolute;
    top: 53px;
    left: 64px;
    display: block;
    width: 117px;
    height: 36px;
  }
  .logo svg { display: block; width: 117px; height: 36px; }

  /* ---------- content block (Frame 774: 72 / 264, 462 wide) ---------- */
  .content {
    position: absolute;
    top: 264px;
    left: 72px;
    width: 462px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .headline {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 50px;
    line-height: 68px;
    color: var(--color-primary-deep);
    /* spec height is 136px = exactly 2 lines at 68px */
  }

  .subhead {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 16px;
    line-height: 24px;
    color: var(--color-primary-deep);
    /* spec height is 72px = 3 lines at 24px */
  }

  /* ---------- CTA button (matches `main` variant: gradient + 15% black overlay + cta shadow) ---------- */
  .cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    width: 148px;
    height: 48px;
    border: 0;
    border-radius: var(--r-md);
    cursor: pointer;
    text-decoration: none;
    /* exact spec: black-15% overlay layered on top of the green→teal gradient */
    background:
      linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15)),
      linear-gradient(90deg, var(--color-primary) 0%, var(--color-teal-mid) 100%);
    box-shadow: var(--shadow-cta);
    transition: filter 120ms ease, transform 120ms ease;
  }
  .cta:hover  { filter: brightness(1.05); }
  .cta:active { transform: translateY(1px); filter: brightness(0.96); }
  .cta-label {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 16px;
    line-height: 24px;
    color: var(--color-text);
    white-space: nowrap;
  }
  .cta-arrow {
    width: 19px;
    height: 19px;
    flex-shrink: 0;
    color: var(--color-text);
  }

  /* ---------- illustration (right side; spec: 486×419 at 721/207, rough placement) ---------- */
  .illustration {
    position: absolute;
    top: 207px;
    left: 721px;
    width: 486px;
    height: 419px;
  }
  .illustration svg { width: 100%; height: 100%; display: block; }
</style>
</head>
