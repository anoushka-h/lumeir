<title>Lumeir — Assessment Setup</title>

<style>
  /* ---------- Lumeir tokens (shared) ---------- */
  :root {
    --color-primary:         #03A582;
    --color-primary-deep:    #058569;
    --color-accent-bright:   #46FFCA;
    --color-accent-mint:     #26BAB5;
    --color-sidebar:         #E9FAF6;
    --color-sidebar-border:  #D6F1EA;
    --color-mint-hover:      #F4FFFD;
    --color-surface:         #FFFFFF;
    --color-text:            #020618;
    --color-text-on-dark:    #FFFFFF;
    --color-text-muted:      #62748E;
    --color-border-soft:     #E2E8F0;
    --color-border:          #CBD5E1;
    --color-bg-page:         #F8FAFC;

    --shadow-button: 0px 2px 7px rgba(96, 96, 96, 0.10);
    --shadow-cta:    0px 4px 7px rgba(63, 255, 200, 0.20);
    --shadow-card:   0px 1px 3px rgba(0, 0, 0, 0.04);

    --r-md:    8px;
    --r-lg:    12px;
    --r-xl:    16px;
    --r-pill:  100px;

    --font-display: 'Manrope', 'Inter', system-ui, sans-serif;
    --font-body:    'Inter', system-ui, sans-serif;

    --t-fast: 200ms;
    --ease:   cubic-bezier(.22, .9, .3, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    color: var(--color-text);
    background: var(--color-bg-page);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .app { display: flex; min-height: 100vh; }

  /* ---------- Sidebar (shared) ---------- */
  .sidebar { width: 189px; background: var(--color-sidebar); padding: 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 36px; }
  .sidebar-logo { display: block; width: 117px; height: 36px; }
  .sidebar-logo svg { width: 100%; height: 100%; display: block; }
  .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--r-md);
              font-family: var(--font-body); font-weight: 500; font-size: 14px; color: var(--color-text);
              text-decoration: none; cursor: pointer; transition: background-color var(--t-fast) var(--ease); }
  .nav-item:hover { background: var(--color-mint-hover); }
  .nav-item.active { background: var(--color-surface); color: var(--color-primary-deep); font-weight: 600; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* ---------- Main ---------- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* ---------- Top bar (shared) ---------- */
  .topbar { height: 88px; display: flex; align-items: center; padding: 0 32px; gap: 16px; }
  .sidebar-toggle { width: 36px; height: 36px; border: 1px solid var(--color-border-soft); background: transparent;
                    border-radius: var(--r-md); cursor: pointer; display: grid; place-items: center;
                    color: var(--color-text-muted); transition: background-color var(--t-fast) var(--ease); }
  .sidebar-toggle:hover { background: var(--color-mint-hover); }
  .sidebar-toggle svg { width: 20px; height: 20px; }
  .topbar-spacer { flex: 1; }
  .search { width: 320px; height: 40px; border: 1px solid var(--color-border-soft); border-radius: var(--r-pill);
            background: var(--color-surface); display: flex; align-items: center; padding: 0 16px; gap: 10px;
            color: var(--color-text-muted); }
  .search svg { width: 16px; height: 16px; flex-shrink: 0; }
  .search input { flex: 1; min-width: 0; border: none; outline: none; background: transparent;
                  font-family: var(--font-body); font-size: 14px; color: var(--color-text); }
  .search input::placeholder { color: var(--color-text-muted); }
  .notif-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent;
               cursor: pointer; color: var(--color-text-muted); display: grid; place-items: center;
               position: relative; transition: background-color var(--t-fast) var(--ease); }
  .notif-btn:hover { background: var(--color-mint-hover); }
  .notif-btn svg { width: 20px; height: 20px; }
  .notif-dot { position: absolute; top: 8px; right: 9px; width: 8px; height: 8px; background: var(--color-primary);
               border-radius: 50%; border: 2px solid var(--color-bg-page); }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--color-primary-deep);
            color: var(--color-text-on-dark); font-family: var(--font-body); font-weight: 600; font-size: 14px;
            display: grid; place-items: center; cursor: pointer; border: none; }

  /* ---------- Progress bar (3-step, Assessment Setup active) ---------- */
  .progress-wrap { padding: 24px 40px 0; }
  .progress { width: 920px; max-width: 100%; margin: 0 auto; }
  .progress-steps { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .progress-step { display: flex; align-items: center; gap: 8px; color: var(--color-text-muted);
                   font-family: var(--font-body); font-size: 14px; font-weight: 500; }
  .progress-step.active,
  .progress-step.done { color: var(--color-primary-deep); font-weight: 600; }
  .progress-step svg { width: 22px; height: 22px; flex-shrink: 0; }
  .progress-bar { height: 5px; background: var(--color-border-soft); border-radius: var(--r-pill); overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--color-primary); border-radius: var(--r-pill);
                       transition: width var(--t-fast) var(--ease); }

  /* ---------- Form area ---------- */
  .form-wrap { padding: 32px 40px; flex: 1; display: flex; flex-direction: column; }
  .form { width: 920px; max-width: 100%; margin: 0 auto; flex: 1; display: flex; flex-direction: column; }
  .form-title { font-family: var(--font-display); font-size: 30px; line-height: 36px; font-weight: 700;
                color: var(--color-text); margin-bottom: 12px; }
  .form-subtitle { font-family: var(--font-body); font-size: 15px; line-height: 24px;
                   color: var(--color-text-muted); max-width: 760px; margin-bottom: 36px; }

  /* ---------- Option cards (shared between this + assessment_method) ---------- */
  .option-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 40px;
  }
  .option-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border-soft);
    border-radius: var(--r-lg);
    padding: 32px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 24px;
    text-align: left;
    font-family: var(--font-body);
    transition: background-color var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                box-shadow var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
    min-height: 320px;
  }
  .option-card:hover {
    background: var(--color-mint-hover);
    border-color: var(--color-sidebar-border);
  }
  .option-card[aria-pressed="true"] {
    border-color: var(--color-primary);
    background: var(--color-mint-hover);
    box-shadow: 0 0 0 1px var(--color-primary) inset, var(--shadow-card);
  }
  .option-card:active { transform: scale(0.997); }

  .option-icon {
    width: 56px;
    height: 56px;
    border-radius: var(--r-md);
    background: var(--color-sidebar);
    color: var(--color-text-muted);
    display: grid;
    place-items: center;
    transition: background-color var(--t-fast) var(--ease), color var(--t-fast) var(--ease);
  }
  .option-icon svg { width: 24px; height: 24px; }
  .option-card[aria-pressed="true"] .option-icon {
    background: var(--color-primary);
    color: var(--color-text-on-dark);
  }

  .option-eyebrow {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--color-primary-deep);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .option-title {
    font-family: var(--font-display);
    font-size: 22px;
    line-height: 28px;
    font-weight: 700;
    color: var(--color-text);
    margin-bottom: 16px;
  }
  .option-desc {
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 22px;
    color: var(--color-text-muted);
  }

  /* ---------- Footer buttons ---------- */
  .form-footer { margin-top: auto; display: flex; justify-content: flex-end; gap: 12px; padding-bottom: 8px; }
  .btn { height: 48px; padding: 0 20px; border-radius: var(--r-md); font-family: var(--font-body);
         font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 8px;
         cursor: pointer; border: none; text-decoration: none;
         transition: background-color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease); }
  .btn svg { width: 18px; height: 18px; }
  .btn-secondary { background: var(--color-surface); color: var(--color-text);
                   border: 1px solid var(--color-border-soft); box-shadow: var(--shadow-button); }
  .btn-secondary:hover { background: var(--color-mint-hover); }
  .btn-primary { background: var(--color-primary); color: var(--color-text-on-dark); box-shadow: var(--shadow-cta); }
  .btn-primary:hover { background: var(--color-primary-deep); }
  .btn-primary:active,
  .btn-secondary:active { transform: scale(0.98); }
</style>
</head>

      <form class="form" onsubmit="event.preventDefault(); window.location.href='assessment_method.html';">

        <h1 class="form-title">Start a new assessment or reuse a previous one?</h1>
        <p class="form-subtitle">Culture-fit profiles capture what your team values. Reuse one you've built, or start fresh.</p>

        <!-- Option cards -->
        <div class="option-cards" role="radiogroup" aria-label="Assessment source">
          <button type="button" class="option-card" role="radio" aria-pressed="true" data-value="new">
            <div class="option-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8 19 13"/><path d="M15 9h.01"/><path d="M17.8 6.2 19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2 11 5"/>
              </svg>
            </div>
            <div>
              <div class="option-eyebrow">Recommended for new teams</div>
              <div class="option-title">Create a new culture-fit assessment</div>
              <p class="option-desc">Invite your team to take a short anonymous assessment. Lumeir AI helps synthesize the results into a culture-fit profile you can review and edit.</p>
            </div>
          </button>

          <button type="button" class="option-card" role="radio" aria-pressed="false" data-value="existing">
            <div class="option-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>
              </svg>
            </div>
            <div>
              <div class="option-eyebrow">Faster</div>
              <div class="option-title">Use an existing culture-fit assessment</div>
              <p class="option-desc">Reuse a profile from a previous role. Best when you've already established what your team values.</p>
            </div>
          </button>
        </div>

        <!-- Footer -->
        <div class="form-footer">
          <a class="btn btn-secondary" href="role_setup.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </a>
          <button type="submit" class="btn btn-primary">Continue</button>
        </div>

      </form>
    </div>

  </main>
</div>

<script>
  // Single-select option cards
  (function () {
    const cards = document.querySelectorAll('.option-card');
    cards.forEach(c => {
      c.addEventListener('click', () => {
        cards.forEach(x => x.setAttribute('aria-pressed', 'false'));
        c.setAttribute('aria-pressed', 'true');
      });
    });
  })();
</script>

<script src="_shared.js"></script>
</body>
</html>
